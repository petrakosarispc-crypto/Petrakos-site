<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ΠΕΤΡΑΚΟΣ | Γυψοσανίδες - Σιδηροκατασκευές Πάτρα</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg-dark: #0f1115; --card-bg: #181b20; --border-color: #2a2e35; --text-main: #ffffff; --viber: #734a96; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        body { background: var(--bg-dark); color: var(--text-main); line-height: 1.6; }

        header { background: rgba(15, 17, 21, 0.95); padding: 20px; text-align: center; border-bottom: 1px solid var(--border-color); position: relative; z-index: 10; }
        .logo-container { max-width: 350px; margin: 0 auto; padding: 10px; border-radius: 12px; background: #000000; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
        .logo-img { width: 100%; height: auto; display: block; border-radius: 6px; }

        .hero { position: relative; padding: 120px 20px; text-align: center; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 85vh; }

        /* SLIDESHOW */
        .hero-bg-slideshow { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .hero-bg-slideshow div { position: absolute; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0; animation: slideAnimation 20s infinite; }
        
        /* ΝΕΑ ΣΕΙΡΑ ΦΩΤΟΓΡΑΦΙΩΝ */
        .hero-bg-slideshow div:nth-child(1) { background-image: url('https://i.ibb.co/MyNFLHwX/20260530-104517.jpg'); animation-delay: 0s; }
        .hero-bg-slideshow div:nth-child(2) { background-image: url('https://i.ibb.co/KjbtBHtg/20260608-140743.jpg'); animation-delay: 5s; }
        .hero-bg-slideshow div:nth-child(3) { background-image: url('https://i.ibb.co/G34xn2gy/20260523-140045.jpg'); animation-delay: 10s; }
        .hero-bg-slideshow div:nth-child(4) { background-image: url('https://i.ibb.co/CTTZ5YV/20260530-104226.jpg'); animation-delay: 15s; }

        @keyframes slideAnimation {
            0% { opacity: 0; } 10% { opacity: 1; } 20% { opacity: 1; } 30% { opacity: 0; } 100% { opacity: 0; }
        }

        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 2; }
        .hero-content { position: relative; z-index: 3; max-width: 850px; }
        .hero h1 { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 900; text-transform: uppercase; color: #fff; text-shadow: 0 4px 15px #000; margin-bottom: 15px; }

        .gallery { padding: 80px 20px; background: var(--bg-dark); text-align: center; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .gallery-item { border-radius: 10px; overflow: hidden; aspect-ratio: 4/3; border: 1px solid var(--border-color); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        
        .viber-float { position: fixed; bottom: 20px; right: 20px; background: var(--viber); color: #fff; width: 55px; height: 55px; border-radius: 50%; font-size: 26px; display: flex; align-items: center; justify-content: center; text-decoration: none; z-index: 100; }
    </style>
</head>
<body>

<a href="viber://chat?number=%2B306986407382" class="viber-float">💬</a>

<header>
    <div class="logo-container">
        <img src="https://i.ibb.co/zWtvPdgS/Screenshot-20260215-164659-Chat-GPT.jpg" alt="Logo" class="logo-img">
    </div>
</header>

<section class="hero">
    <div class="hero-bg-slideshow">
        <div></div><div></div><div></div><div></div>
    </div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <h1>Σύγχρονη Δόμηση & Design</h1>
        <p>Εξειδικευμένες λύσεις σε γυψοσανίδες και σιδηροκατασκευές στην Πάτρα.</p>
        <div style="margin-top: 30px;">
            <a href="tel:6986407382" style="background:#fff; color:#000; padding:15px 30px; text-decoration:none; border-radius:8px; font-weight:800;">📞 ΚΛΗΣΗ</a>
        </div>
    </div>
</section>

<section class="gallery" id="gallery">
    <h2>ΤΑ ΕΡΓΑ ΜΑΣ</h2>
    <div class="gallery-grid" style="margin-top: 40px;">
        <div class="gallery-item"><img src="https://i.ibb.co/MyNFLHwX/20260530-104517.jpg" alt="Έργο"></div>
        <div class="gallery-item"><img src="https://i.ibb.co/KjbtBHtg/20260608-140743.jpg" alt="Έργο"></div>
        <div class="gallery-item"><img src="https://i.ibb.co/G34xn2gy/20260523-140045.jpg" alt="Έργο"></div>
        <div class="gallery-item"><img src="https://i.ibb.co/CTTZ5YV/20260530-104226.jpg" alt="Έργο"></div>
    </div>
</section>

</body>
</html>
